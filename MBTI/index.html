<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초등학생 MBTI 성향 검사</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-indigo-100 text-slate-800">
  <main class="max-w-5xl mx-auto px-4 py-8">
    <section id="testPage">
      <div class="bg-white/90 rounded-3xl shadow-xl p-6 md:p-10 border border-purple-100">
        <div class="text-center mb-8">
          <span class="inline-block px-4 py-1 rounded-full bg-purple-100 text-purple-700 text-sm font-bold mb-3">
            초등학생용 성향 테스트
          </span>
          <h1 class="text-3xl md:text-4xl font-extrabold text-purple-700 mb-3">
            나의 MBTI 성향 알아보기
          </h1>
          <p class="text-slate-600">
            아래 질문을 읽고 나와 더 가까운 답을 골라보세요. 정답은 없어요!
          </p>
        </div>

        <div class="mb-8 grid md:grid-cols-2 gap-4">
          <label class="block">
            <span class="block mb-2 font-bold text-slate-700">이름</span>
            <input id="studentName" type="text" placeholder="예: 지연"
              class="w-full rounded-2xl border border-purple-200 px-4 py-3 outline-none focus:ring-4 focus:ring-purple-100 focus:border-purple-400" />
          </label>
          <label class="block">
            <span class="block mb-2 font-bold text-slate-700">학년</span>
            <select id="studentGrade"
              class="w-full rounded-2xl border border-purple-200 px-4 py-3 outline-none focus:ring-4 focus:ring-purple-100 focus:border-purple-400">
              <option value="">학년을 선택하세요</option>
              <option>1학년</option>
              <option>2학년</option>
              <option>3학년</option>
              <option>4학년</option>
              <option>5학년</option>
              <option>6학년</option>
            </select>
          </label>
        </div>

        <form id="mbtiForm" class="space-y-5"></form>

        <div class="mt-8 flex flex-col md:flex-row gap-3 justify-between items-center">
          <p id="warningMessage" class="text-red-500 font-bold hidden">
            모든 질문에 답해주세요!
          </p>
          <button id="saveButton" type="button"
            class="w-full md:w-auto px-8 py-4 rounded-2xl bg-purple-600 text-white font-extrabold shadow-lg shadow-purple-200 hover:bg-purple-700 hover:-translate-y-1 transition">
            저장하고 분석하기
          </button>
        </div>
      </div>
    </section>

    <section id="resultPage" class="hidden">
      <div class="bg-white/90 rounded-3xl shadow-xl p-6 md:p-10 border border-purple-100">
        <div class="text-center mb-8">
          <span class="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-700 text-sm font-bold mb-3">
            분석 결과
          </span>
          <h2 id="resultTitle" class="text-3xl md:text-4xl font-extrabold text-purple-700 mb-3"></h2>
          <p id="resultSubtitle" class="text-slate-600"></p>
        </div>

        <div class="grid md:grid-cols-2 gap-5 mb-8">
          <div class="rounded-3xl bg-purple-50 p-6 border border-purple-100">
            <h3 class="text-xl font-extrabold text-purple-700 mb-3">성격의 강점</h3>
            <ul id="strengthList" class="space-y-2 list-disc pl-5 text-slate-700"></ul>
          </div>
          <div class="rounded-3xl bg-pink-50 p-6 border border-pink-100">
            <h3 class="text-xl font-extrabold text-pink-700 mb-3">주의하면 좋은 점</h3>
            <ul id="weaknessList" class="space-y-2 list-disc pl-5 text-slate-700"></ul>
          </div>
          <div class="rounded-3xl bg-indigo-50 p-6 border border-indigo-100">
            <h3 class="text-xl font-extrabold text-indigo-700 mb-3">나에게 맞는 학습 방법</h3>
            <ul id="studyList" class="space-y-2 list-disc pl-5 text-slate-700"></ul>
          </div>
          <div class="rounded-3xl bg-yellow-50 p-6 border border-yellow-100">
            <h3 class="text-xl font-extrabold text-yellow-700 mb-3">추천 직업</h3>
            <div id="jobList" class="flex flex-wrap gap-2"></div>
          </div>
        </div>

        <div class="rounded-3xl bg-slate-50 p-6 border border-slate-200 mb-8">
          <h3 class="text-xl font-extrabold text-slate-700 mb-3">유형 점수</h3>
          <div id="scoreBox" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>

        <div class="flex flex-col md:flex-row gap-3 justify-center">
          <button id="retryButton"
            class="px-8 py-4 rounded-2xl bg-slate-700 text-white font-extrabold hover:bg-slate-800 hover:-translate-y-1 transition">
            다시 검사하기
          </button>
          <button id="printButton"
            class="px-8 py-4 rounded-2xl bg-purple-600 text-white font-extrabold hover:bg-purple-700 hover:-translate-y-1 transition">
            결과 인쇄하기
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
